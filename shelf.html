  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: #000; }

    .shelf-wrap {
      position: relative;
      width: 100vw;
    }

    .shelf-img {
      width: 100%;
      display: block;
    }

    /* Each row sits over one shelf in the image.
       Adjust top/height percentages once you see it in the browser. */
    .shelf-row {
      position: absolute;
      display: flex;
      align-items: flex-end;
      justify-content: space-evenly;
      left: 5%;
      right: 5%;
      height: 20%;
    }

    .shelf-row--1 { top: 6%; }
    .shelf-row--2 { top: 37%; }
    .shelf-row--3 { top: 66%; }

    .spine {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      text-decoration: none;
      cursor: pointer;
      padding: 6px 3px;
      height: 90%;
      color: rgba(255, 238, 190, 0.82);
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.9);
      transition: color 250ms ease;
    }

    .spine:hover { color: #fff; }

    .spine__title,
    .spine__author {
      opacity: 0;
    }

    /* The Ground Beneath the Ought — same look, no announcement */
    .spine--ground { color: rgba(255, 232, 140, 0.85); }
    .spine--ground:hover { color: #ffe87a; }

    .back-link {
      display: block;
      text-align: center;
      padding: 1.5rem;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.8rem;
      color: rgba(255, 238, 190, 0.5);
      text-decoration: none;
      letter-spacing: 0.08em;
    }
    .back-link:hover { color: rgba(255, 238, 190, 0.9); }
  </style>
</head>
